<!DOCTYPE html>
<html>
<head>
    <title>Account Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <script src="/static/script.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .login-box { max-width: 400px; margin: 100px auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px; background: white; }
        .logo { text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <img src="https://via.placeholder.com/150x50?text=FAKE+BANK" alt="Fake Bank Logo">
        </div>
        <form action="/" method="POST">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div class="mb-3" id="captcha-container">
                <!-- Fake CAPTCHA (anti-bot) -->
                <div style="background: #f0f0f0; padding: 10px; border-radius: 3px; text-align: center;">
                    <strong>Security Check</strong><br>
                    <span id="captcha-text" style="font-family: monospace; letter-spacing: 3px;">5J7K9</span>
                    <input type="text" class="form-control mt-2" placeholder="Enter CAPTCHA" id="captcha-input" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="submit-btn" disabled>Login</button>
        </form>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
